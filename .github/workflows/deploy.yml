name: Deploy to Cloudflare Pages

# Push-to-deploy: any push to master (or a manual run) assembles the deploy
# folder and publishes it to the Cloudflare Pages project via Direct Upload.
# Uses the API token stored in the repo's Actions secrets.

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      # Portable equivalent of build-dist.ps1 (that script is PowerShell and
      # can't run on the Linux builder): static assets + Pages Functions.
      - name: Assemble dist/
        run: |
          rm -rf dist && mkdir dist
          cp index.html admin.html favicon.svg manifest.json sw.js dist/
          cp -r css js functions dist/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name rewardmaths --branch main
